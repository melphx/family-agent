# Copy to config.yaml. Demo mode works with this file unedited.

mode: demo            # "demo" = no external calls; "live" = use real APIs

llm:
  provider: openai
  model: gpt-4o       # any current OpenAI model
  api_key: ""         # or set OPENAI_API_KEY env var

approvals:
  # Only read/monitor action types may auto-approve. Everything else waits for you.
  auto_approve_types:
    - read_email
    - read_calendar
    - check_website
  web_port: 8000

family:
  members:
    - name: Mel
      role: parent
    - name: Digby
      role: child
      age: 7
      activities: []   # add real activities here, e.g. karate, soccer
      therapies:
        - name: Occupational Therapy (OT)
          provider: Kids Care Pediatric PT & OT Services
          location: "711 Troy-Schenectady Rd, Suite 214, Latham NY 12110"
          phone: "(518) 786-1665"
          scheduling: "Book every 2-3 months — they don't schedule further out"
          rebook_trigger_weeks: 6
        - name: Physical Therapy (PT)
          provider: Kids Care Pediatric PT & OT Services
          location: "711 Troy-Schenectady Rd, Suite 214, Latham NY 12110"
          phone: "(518) 786-1665"
          scheduling: "Book every 2-3 months — they don't schedule further out"
          rebook_trigger_weeks: 6

connectors:
  gmail:
    enabled: false        # set true for Phase 1 (with mode: live)
    scopes: ["https://www.googleapis.com/auth/gmail.readonly"]
    query: "is:unread newer_than:14d -category:promotions -category:social"
    max_results: 20
  calendar:
    enabled: false
    scopes: ["https://www.googleapis.com/auth/calendar.events"]
  web_monitor:
    enabled: false
    targets: []   # add real URLs to monitor
