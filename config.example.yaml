# Copy to config.yaml. Demo mode works with this file unedited.

mode: demo            # "demo" = no external calls; "live" = use real APIs

llm:
  provider: openai
  model: gpt-4o       # any current OpenAI model
  api_key: ""         # or set OPENAI_API_KEY env var

approvals:
  # Only read/monitor action types may auto-approve. Everything else waits for you.
  auto_approve_types:
    - read_email
    - read_calendar
    - check_website
  web_port: 8000

family:
  members:
    - name: Mel
      role: parent
    - name: Digby
      role: child
      age: 7
      activities:
        - name: karate
          website: "https://example-karate-school.com/schedule"
          signup: "weekly"

connectors:
  gmail:
    enabled: false        # set true for Phase 1 (with mode: live)
    scopes: ["https://www.googleapis.com/auth/gmail.readonly"]
    query: "is:unread newer_than:7d"   # which messages to ingest
    max_results: 10
  calendar:
    enabled: false
    scopes: ["https://www.googleapis.com/auth/calendar.events"]
  web_monitor:
    enabled: true
    targets:
      - name: "Digby karate schedule"
        url: "https://example-karate-school.com/schedule"
